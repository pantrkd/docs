openapi: 3.0.2
info:
  title: Course Scheduler REST API
  description: >-
    Defines the API specification for communication between the backend and
    frontend. Additional clients on different platforms may be created by
    consuming this API.
  version: 1.0.0
servers:
  - url: http://localhost:8989/api/v1
    description: development server
paths:
  /sections:
    summary: Course section objects
    description: filter, sort and return a list of section objects
    get:
      operationId: filterSections
      summary: Filter and sort sections
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: fuzzy search against certain fields // TODO
          example: writing
        - name: crn
          in: query
          schema:
            type: number
          example: 82001
        - name: subject
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example:
            - ENC
            - MAC
        - name: courseNumber
          in: query
          schema:
            type: integer
          example: 1101
        - name: term
          in: query
          schema:
            type: string
          example: Fall 2026
        - name: campus
          in: query
          schema:
            type: string
          example: Main Campus-UNF
        - name: instructor
          in: query
          schema:
            type: string
          example: Mary Humphries
        - name: attributes
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example:
            - General Education Course
        - name: scheduleType
          in: query
          schema:
            type: string
          example: Class
        - name: days
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - monday
                - tuesday
                - wednesday
                - thursday
                - friday
                - saturday
                - sunday
          style: form
          explode: true
        - name: isOpen
          in: query
          schema:
            type: boolean
          description: Filter for sections with remaining seats.
          example: true
        - name: hasWaitlist
          in: query
          schema:
            type: boolean
          example: true
        - name: minCreditHours
          in: query
          schema:
            type: integer
            minimum: 0
          example: 3
        - name: maxCreditHours
          in: query
          schema:
            type: integer
            minimum: 0
          example: 4
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - title
              - subject
              - courseNumber
              - creditHours
              - seatsRemaining
              - instructor
          example: title
        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
          example: asc
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for paginated results.
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Maximum number of results returned per page.
          example: 25
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Section'
          description: OK
        '503':
          description: Unable to fetch data from the database

components:
  schemas:
    Section:
      type: object
      required:
        - crn
        - title
        - subject
        - courseNumber
        - sectionNumber
        - creditHours
        - term
        - instructor
        - meetings
        - campus
        - status
        - scheduleType
        - attributes
        - linked
        - subjectDesc
      properties:
        crn:
          type: integer
          example: 83013
        title:
          type: string
          example: (GW) Writing for Audience and Purpose
        subject:
          type: string
          example: ENC
        subjectDesc:
          type: string
          example: English Composition
        courseNumber:
          type: integer
          example: 1101
        sectionNumber:
          type: integer
          example: 0
        creditHours:
          type: integer
          example: 3
        term:
          type: string
          example: Fall 2026
        instructor:
          type: array
          items:
            $ref: '#/components/schemas/Instructor'
        meetings:
          type: array
          items:
            $ref: '#/components/schemas/Meeting'
        campus:
          type: string
          example: Main Campus-UNF
        status:
          $ref: '#/components/schemas/SectionStatus'
        scheduleType:
          type: string
          example: Class
        attributes:
          type: array
          items:
            type: string
          example:
            - State Core Communication
            - 'Gen Edu: English Composition'
            - General Education Course
        linked:
          type: array
          description: Linked section CRNs
          items:
            type: integer
          example: []
    Instructor:
      type: object
      required:
        - name
        - isPrimary
      properties:
        name:
          type: string
          example: Kathrine (Kathy) Jaffe McCormick
        email:
          type: string
          format: email
          example: n0385603@unf.edu
        isPrimary:
          type: boolean
          example: true
    Meeting:
      type: object
      required:
        - days
        - hasMeeting
        - type
      properties:
        days:
          type: array
          items:
            type: string
            enum:
              - monday
              - tuesday
              - wednesday
              - thursday
              - friday
              - saturday
              - sunday
        startTime:
          $ref: '#/components/schemas/Time'
        endTime:
          $ref: '#/components/schemas/Time'
        hasMeeting:
          type: boolean
          example: true
        type:
          type: string
          example: class
        building:
          type: "string"
          nullable: true
          example: 9-mcaffe auditor hall
        room:
          type: "string"
          nullable: true
          example: '1411'
        startDate:
          $ref: '#/components/schemas/SimpleDate'
        endDate:
          $ref: '#/components/schemas/SimpleDate'
    Time:
      type: object
      required:
        - hour
        - minute
      properties:
        hour:
          type: integer
          minimum: 0
          maximum: 23
          example: 16
        minute:
          type: integer
          minimum: 0
          maximum: 59
          example: 30
    SimpleDate:
      type: object
      required:
        - year
        - month
        - day
      properties:
        year:
          type: integer
          example: 2026
        month:
          type: integer
          minimum: 1
          maximum: 12
          example: 8
        day:
          type: integer
          minimum: 1
          maximum: 31
          example: 17
    SectionStatus:
      type: object
      required:
        - isFull
        - seatsRemaining
        - totalSeats
        - hasWaitlist
      properties:
        isFull:
          type: boolean
          example: false
        seatsRemaining:
          type: integer
          example: 12
        totalSeats:
          type: integer
          example: 24
        hasWaitlist:
          type: boolean
          example: true
        waitlistRemaining:
          type: integer
          nullable: true
          example: 10
        waitlistTotal:
          type: integer
          nullable: true
          example: 10